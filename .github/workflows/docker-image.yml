name: Docker Image Build

on:
  workflow_dispatch:
    inputs:
      image:
        description: 'Image to build'
        required: true
        type: choice
        options:
          - flang-wasm
          - opencl-triton-amd
          - opencl-triton
          - quickjsr-cross-tests
          - r-devel
          - revdeps
          - rtools-build
          - sem
          - stan-triton
          - vulkan-triton
          - webr-build
      platform:
        description: "Build architecture(s)"
        required: false
        type: string
        default: "linux/amd64"

jobs:
  build-and-push-images:
    name: Build and Push ${{ inputs.image }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Set up QEMU
      if: ${{ inputs.platform != 'linux/amd64' }}
      uses: docker/setup-qemu-action@v4

    - uses: docker/setup-buildx-action@v4

    - uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Download build files
      if: ${{ inputs.image == 'sem' }}
      run: wget "${{ secrets.MPLUS_DOWNLOAD_URL }}" -O ComboLinux64.bin

    - uses: docker/build-push-action@v4
      with:
        platforms: ${{ inputs.platform }}
        file: ${{ inputs.image }}.Dockerfile
        push: true
        tags: andrjohns/${{ inputs.image }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        context: "."
